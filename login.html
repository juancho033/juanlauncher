<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JuanLauncher - Autenticación</title>
    <meta name="description" content="Inicia sesión o regístrate en JuanLauncher para descargar juegos.">
    <link rel="stylesheet" href="style.css?v=4">
    <link rel="shortcut icon" href="img/juanlauncher/logo-favicon.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body class="auth-body">
    <div class="auth-overlay"></div>

    <div class="auth-wrapper">
        <div class="auth-form-container" id="authContainer">
            <!-- Formulario de Inicio de Sesión -->
            <div class="auth-form">
                <h1 class="auth-title">Iniciar Sesión</h1>
                <form action="#" method="get" onsubmit="event.preventDefault();">
                    <div class="auth-input-group">
                        <label for="login-email">Correo Electrónico</label>
                        <input type="email" id="login-email" placeholder="tulogin@correo.com" required>
                    </div>
                    <div class="auth-input-group">
                        <label for="login-pass">Contraseña</label>
                        <input type="password" id="login-pass" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="auth-btn">Ingresar</button>
                    
                    <p class="auth-switch">¿No tienes cuenta? <span onclick="toggleAuth()">Regístrate</span></p>
                </form>
            </div>

            <!-- Formulario de Registro -->
            <div class="auth-form">
                <h1 class="auth-title">Registro</h1>
                <form action="#" method="get" onsubmit="event.preventDefault();">
                    <div class="auth-input-group">
                        <label for="reg-name">Nombre de Usuario</label>
                        <input type="text" id="reg-name" placeholder="GamerPro123" required>
                    </div>
                    <div class="auth-input-group">
                        <label for="reg-email">Correo Electrónico</label>
                        <input type="email" id="reg-email" placeholder="tulogin@correo.com" required>
                    </div>
                    <div class="auth-input-group">
                        <label for="reg-pass">Contraseña</label>
                        <input type="password" id="reg-pass" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="auth-btn">Crear Cuenta</button>
                    
                    <p class="auth-switch">¿Ya tienes cuenta? <span onclick="toggleAuth()">Iniciar Sesión</span></p>
                </form>
            </div>
        </div>

        <a href="index.html" class="auth-back">← Volver al inicio</a>
    </div>

    <script>
        function toggleAuth() {
            document.getElementById('authContainer').classList.toggle('slide-register');
        }

        // Simulación de Login para el USER
        function handleMockLogin(event) {
            event.preventDefault();
            localStorage.setItem("isLoggedIn", "true");
            localStorage.setItem("userName", "GamerPro_" + Math.floor(Math.random() * 100)); // Nombre aleatorio
            window.location.href = "comunidad.html";
        }

        // Asignar a los formularios
        document.querySelectorAll('form').forEach(form => {
            form.onsubmit = handleMockLogin;
        });
    </script>
</body>

</html>
