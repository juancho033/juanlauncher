<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JuanLauncher - Inicio</title>
    <meta name="description" content="Página oficial de JuanLauncher. El mejor lugar para probar juegos de pc y descargar.">
    <meta name="keywords" content="JuanLauncher, Juancho, web development, software games pc, juegos, mediafire">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="img/juanlauncher/logo-favicon.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

    <header>
        <div class="logo">JuanLauncher</div>
        <nav>
            <a href="ayuda.html" class="nav-link">Ayuda</a>
            <a href="compatibilidad.html" class="nav-link">🖥️ ¿Corre en mi PC?</a>
        </nav>
        <a href="contacto.html" class="nav-link">Contacto</a>
        <div class="search-bar">
            <input type="text" id="buscador" placeholder="Buscar juego...">
        </div>

        <!-- Botones de redes sociales -->
            <div class="social-links">
                <a href="https://github.com/juancho033/juanlauncher" target="_blank" class="social-btn github-btn"
                    title="Mi GitHub">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22">
                        </path>
                    </svg>
                </a>
                <a href="https://www.youtube.com/@JUANCHODEV22" target="_blank" class="social-btn youtube-btn"
                    title="Mi YouTube">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33A2.78 2.78 0 0 0 3.4 19c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.25 29 29 0 0 0-.46-5.33z">
                        </path>
                        <polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"></polygon>
                    </svg>
                </a>
            </div>

    </header>

    <main>
        <!-- SECCIÓN DE FILTROS -->
        <div class="filters-container">
            <div class="platform-switch">
                <button class="plat-btn active" data-plat="pc">💻 PC</button>
                <button class="plat-btn" data-plat="android">📱 Android</button>
            </div>

            <!-- Categorías -->
            <div class="genre-list">
                <button class="genre-btn active" data-cat="todos">Todos</button>
                <button class="genre-btn" data-cat="accion">Acción</button>
                <button class="genre-btn" data-cat="aventura">Aventura</button>
                <button class="genre-btn" data-cat="terror">Terror</button>
                <button class="genre-btn" data-cat="ritmo">Ritmo</button>
                <button class="genre-btn" data-cat="supervivencia">Supervivencia</button>
                <button class="genre-btn" data-cat="metroidvania">Metroidvania</button>
                <button class="genre-btn" data-cat="estrategia">Estrategia</button>
            </div>
        </div>


        <h1 id="titulo-seccion">Catálogo PC</h1>
        <div class="games-grid" id="contenedor-juegos"></div>
    </main>

    <button id="btn-sorprendeme" class="surprise-btn">🎲 Sorpréndeme</button>

    <footer>
        <p style="text-align: center;">&copy; 2026 JuanLauncher Hecho con ❤️.</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
